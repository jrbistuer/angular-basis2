<app-header [title]="'Books'" [showOferta]="true"></app-header>

<div class="content">

    <h1>Contenido de Books</h1>

    <!-- [title] i [selectedBook]: Inputs passats al component fill per gestionar-se en el fill; selectedBook es el llibre seleccionat per editar -->
    <!-- (onEnterButtonPressed) i (onActualitzarButtonPressed): Outputs emesos pel fill, capturats aquí i passats a les funcions d'aquí -->
    <app-book-form [title]="'Nou llibre'"
        [selectedBook]="selectedBook"
        (onEnterButtonPressed)="addBook($event)"
        (onActualitzarButtonPressed)="updateBook($event)"></app-book-form>

    <h2>Llistat de llibres</h2>

    <!-- booksService.books() → invoca el signal (funció); @for es re-renderitza automàticament quan canvia -->
    @for (book of booksService.books(); track $index) {
        <div class="book">
            <div><b>{{ book.title }}</b> -- {{ book.author }}   
                ----   <span (click)="booksService.deleteBook(book.id!)">Eliminar</span>
                ----   <span (click)="editBook(book)">Editar</span>
            </div>
        </div>
    }


</div>
